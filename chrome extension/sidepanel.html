<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f9; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; margin-top: 0; font-size: 18px; }
        .status { font-weight: bold; margin-bottom: 20px; }
        .status-idle { color: #5f6368; }
        .status-active { color: #188038; }
        button { 
            width: 100%; padding: 10px; border: none; border-radius: 4px; 
            background: #1a73e8; color: white; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #1557b0; }
        .log { font-size: 11px; color: #666; margin-top: 20px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h2>MeeTunnel Control</h2>
        <div class="status">Status: <span id="statusLabel" class="status-idle">Disconnected</span></div>
        <button id="toggleBtn">Start Capture</button>
        
        <div class="log">
            <strong>System Logs:</strong>
            <div id="logOutput">Ready to capture...</div>
        </div>
    </div>
    <script src="sidepanel.js"></script>
</body>
</html>
